<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-box">
            <h2>👤 Личный кабинет</h2>

            <div id="loadingMessage">Загрузка...</div>
            
            <div class="user-info">
                <p><strong>Имя пользователя:</strong> <span id="username">...</span></p>
                <p><strong>Email:</strong> <span id="email">...</span></p>
                <p><strong>Роль:</strong> <span id="role">...</span></p>
                <p><strong>Телефон:</strong> <span id="telephone_number">...</span></p>
                <p><strong>Компания:</strong> <span id="company">...</span></p>
            </div>
            
            <div id="adminPanelBtn" style="display: none; margin-bottom: 20px;">
                <a href="/admin.html" class="admin-btn">🔧 Админ-панель</a>
            </div>
            
            <button id="scheduleBtn" class="schedule-btn">📅 График швартовки</button>

            <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
        </div>
    </div>

    <script src="/static/js/dashboard.js?v=2.3"></script>
</body>
</html>
