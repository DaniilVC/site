<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель директора — VesselGo</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <!-- Стиль с админки (да, я гений)-->
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <a href="/dashboard.html" class="back-link">← Назад в личный кабинет</a>
        <h1>👔 Панель директора</h1>
        
        <!-- Статистика -->
        <div class="stats">
            <div class="stat-card">
                <h3>Всего сотрудников</h3>
                <div class="number" id="totalEmployees">-</div>
            </div>
            <div class="stat-card">
                <h3>Агентов</h3>
                <div class="number" id="agentCount">-</div>
            </div>
            <div class="stat-card">
                <h3>Наблюдателей</h3>
                <div class="number" id="viewerCount">-</div>
            </div>
        </div>
        
        <!-- Таблица -->
        <div class="users-table">
            <h2>👔 Управление сотрудниками</h2>
            <table>
                <thead>
                    <tr>
                        <th>Логин</th>
                        <th>Email</th>
                        <th>Роль</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="emp-table-body">
                    <tr><td colspan="4">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="/static/js/directory.js"></script>
</body>
</html>
