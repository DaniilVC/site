<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="static/css/common.css">
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <h2>📝 Регистрация</h2>
            
            <div id="message" class="message"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Имя пользователя *</label>
                    <input type="text" id="username" name="username" placeholder="Придумайте логин" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="telephone_number">Телефон</label>
                    <input type="text" id="telephone_number" name="telephone_number" placeholder="79991234567">
                </div>
                
                <div class="form-group">
                    <label for="company">Компания</label>
                    <input type="text" id="company" name="company" placeholder="Название компании">
                </div>
                
                <button type="submit" class="register-btn">Зарегистрироваться</button>
            </form>
            
            <div class="footer">
                <p>Уже есть аккаунт? <a href="/login.html">Войти</a></p>
            </div>
        </div>
    </div>

    <script src="/static/js/register.js"></script>
</body>
</html>
